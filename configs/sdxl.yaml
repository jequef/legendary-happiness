# AI-Toolkit sdxl LoRA template. arch "sdxl" makes StableDiffusion.is_xl true
# (SOURCE_FINDINGS §4/§8); name_or_path is the base single-file OR a CivitAI
# .safetensors path (from_single_file auto-dispatches on a file path). No quantize.
---
job: extension
config:
  name: aitk_lora
  process:
    - type: sd_trainer
      training_folder: "{training_folder}"
      device: cuda:0
      network:
        type: lora
        linear: 32
        linear_alpha: 32
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 100000
      datasets:
        - folder_path: "{dataset_path}"
          caption_ext: txt
          caption_dropout_rate: 0.05
          cache_latents_to_disk: true
          resolution: [1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: true
        gradient_checkpointing: true
        noise_scheduler: ddpm
        optimizer: adamw8bit
        lr: 1e-4
        dtype: bf16
        disable_sampling: true
      model:
        name_or_path: "{name_or_path}"
        arch: sdxl
        quantize: false
        quantize_te: false
meta:
  name: aitk_lora
  version: "1.0"
